name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            shell: pwsh
          - platform: macos
            os: macos-latest
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Wails CLI on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add Go bin to PATH on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download Go modules on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: go mod download

      - name: Download Go modules on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: go mod download

      - name: Build release package on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: wails build -clean

      - name: Build release package on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: wails build -clean -platform darwin/universal

      - name: Prepare Windows assets
        if: matrix.platform == 'windows'
        id: assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = "dist"
          $zipName = "IPSwitch-$tag-windows-amd64.zip"
          $zipPath = Join-Path $distDir $zipName
          $exePath = "build/bin/IPSwitch.exe"

          if (-not (Test-Path $distDir)) {
            New-Item -ItemType Directory -Path $distDir | Out-Null
          }

          if (-not (Test-Path $exePath)) {
            throw "Build output not found: $exePath"
          }

          Compress-Archive -Path $exePath -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          $checksumFile = Join-Path $distDir "checksums-windows.txt"
          "$hash  $zipName" | Out-File -FilePath $checksumFile -Encoding ascii

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumFile" >> $env:GITHUB_OUTPUT

      - name: Prepare macOS assets
        if: matrix.platform == 'macos'
        id: mac_assets
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          dist_dir="dist"
          mkdir -p "$dist_dir"

          app_path="$(find build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Build output not found: build/bin/*.app" >&2
            exit 1
          fi

          app_name="$(basename "$app_path")"
          dmg_name="IPSwitch-${tag}-macos-universal.dmg"
          dmg_path="${dist_dir}/${dmg_name}"
          staging_dir="$(mktemp -d)"
          cp -R "$app_path" "$staging_dir/$app_name"

          hdiutil create \
            -volname "IPSwitch" \
            -srcfolder "$staging_dir" \
            -ov \
            -format UDZO \
            "$dmg_path"

          checksum_path="${dist_dir}/checksums-macos.txt"
          shasum -a 256 "$dmg_path" | awk '{print tolower($1) "  '"$dmg_name"'"}' > "$checksum_path"

          echo "zip_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$checksum_path" >> "$GITHUB_OUTPUT"

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: |
            ${{ steps.assets.outputs.zip_path }}
            ${{ steps.assets.outputs.checksum_path }}
            ${{ steps.mac_assets.outputs.zip_path }}
            ${{ steps.mac_assets.outputs.checksum_path }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-assets-*
          merge-multiple: true

      - name: Detect release notes file
        id: notes
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          notes_file="RELEASE_NOTES_${tag}.md"

          if [ -f "$notes_file" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$notes_file" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release with custom notes
        if: steps.notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: IPSwitch ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/*

      - name: Publish GitHub release with generated notes
        if: steps.notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: IPSwitch ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
